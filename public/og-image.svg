      <stop offset="0%"  stop-color="#1B2F3A"/>
      <stop offset="100%" stop-color="#0A1118"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line -->
  <rect x="80" y="280" width="3" height="90" fill="#3FE0C5" rx="1"/>

  <!-- Name -->
  <text x="108" y="330" font-family="system-ui, -apple-system, sans-serif"
