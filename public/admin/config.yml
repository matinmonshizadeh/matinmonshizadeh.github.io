backend:
  name: github
  repo: matinmonshizadeh/matinmonshizadeh.github.io
  branch: main
  base_url: https://portfolio-cms-oauth.vercel.app

media_folder: src/assets/uploads
public_folder: /assets/uploads

collections:

  # ── Projects ──────────────────────────────────────────────────────────────
  - name: projects
    label: Projects
    folder: src/content/projects
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - name: title
        widget: string
        label: Title

      - name: type
        widget: select
        label: Type
        default: university
        options:
          - { label: "University Project",  value: university }
          - { label: "Independent Project", value: independent }
          - { label: "Fun Game",            value: game }

      - name: date
        widget: datetime
        label: Date
        date_only: true
        format: "YYYY-MM-DD"

      - name: cover
        widget: image
        label: Cover Image
        hint: "Upload a 16:9 image (JPG, PNG, SVG). Stored in public/images/projects/."
        media_folder: /public/images/projects
        public_folder: /images/projects

      - name: description
        widget: text
        label: Short Description
        hint: "One or two sentences shown on cards."

      - name: featured
        widget: boolean
        label: Featured on Home Page
        default: false

      - name: tags
        widget: list
        label: Tags
        hint: "Topics shown as badges (e.g. Computer Vision, PyTorch)"

      - name: stack
        widget: list
        label: Tech Stack
        hint: "Libraries and tools used"

      - name: links
        widget: object
        label: Links
        required: false
        collapsed: true
        fields:
          - name: github
            widget: string
            label: GitHub URL
            required: false
            pattern: ['^(https?://.+)?$', 'Must be a full URL starting with https:// (or leave empty)']
          - name: demo
            widget: string
            label: Live Demo URL
            required: false
            pattern: ['^(https?://.+)?$', 'Must be a full URL starting with https:// (or leave empty)']
          - name: paper
            widget: string
            label: Paper URL
            required: false
            pattern: ['^(https?://.+)?$', 'Must be a full URL starting with https:// (or leave empty)']
          - name: play
            widget: string
            label: Play URL (in-browser)
            required: false
            pattern: ['^(https?://.+)?$', 'Must be a full URL starting with https:// (or leave empty)']

      - name: body
        widget: markdown
        label: Content
        hint: "Sections: Problem, Approach, Results"

  # ── Site Settings ──────────────────────────────────────────────────────────
  - name: site
    label: Site Settings
    files:
      - name: config
        label: Global Config
        file: src/content/site/config.md
        fields:
          - { name: name,     widget: string, label: "Full Name" }
          - { name: role,     widget: string, label: "Role line (shown in hero)" }
          - { name: tagline,  widget: string, label: "Hero tagline" }
          - { name: intro,    widget: text,   label: "Intro strip paragraph" }
          - { name: email,    widget: string, label: "Email address" }
          - name: github
            widget: string
            label: "GitHub profile URL"
            pattern: ['^https?://.+', 'Must be a full URL starting with https://']
          - name: linkedin
            widget: string
            label: "LinkedIn profile URL"
            pattern: ['^https?://.+', 'Must be a full URL starting with https://']
          - name: artstation
            widget: string
            label: "ArtStation profile URL"
            required: false
            pattern: ['^(https?://.+)?$', 'Must be a full URL starting with https:// (or leave empty)']
          - { name: cv,       widget: string, label: "CV path (e.g. /cv.pdf)" }
          - { name: location, widget: string, label: "Location", required: false }
          - name: projects_page_desc
            widget: text
            label: "Projects page — subtitle"
            hint: "Shown below the 'Projects' heading."
          - name: university_section_desc
            widget: string
            label: "University section — description"
          - name: independent_section_desc
            widget: string
            label: "Independent Projects section — description"
          - name: games_section_desc
            widget: string
            label: "Games section — description"

  # ── About ──────────────────────────────────────────────────────────────────
  - name: about
    label: About Page
    files:
      - name: about
        label: About Page
        file: src/content/about/about.md
        fields:
          - name: professional_summary
            widget: object
            label: Professional Summary
            fields:
              - { name: heading,   widget: string, label: "Section heading" }
              - name: photo
                widget: image
                label: Profile Photo
                required: false
                hint: "Upload your photo."
                media_folder: /public/images/about
                public_folder: /images/about
              - { name: photo_alt, widget: string, label: "Photo alt text", required: false }

          - name: technical_skills
            widget: object
            label: Technical Skills
            fields:
              - { name: heading, widget: string, label: "Section heading" }
              - name: groups
                widget: list
                label: Skill Groups
                fields:
                  - { name: name, widget: string, label: "Group name (e.g. Languages)" }
                  - name: skills
                    widget: list
                    label: Skills
                    hint: "One skill per item (e.g. Python)"

          - name: education
            widget: object
            label: Education
            fields:
              - { name: heading, widget: string, label: "Section heading" }
              - name: entries
                widget: list
                label: Education Entries
                fields:
                  - { name: degree,      widget: string, label: Degree }
                  - { name: institution, widget: string, label: Institution }
                  - { name: location,    widget: string, label: Location, required: false }
                  - { name: start_date,  widget: string, label: Start Date (e.g. Sep 2024) }
                  - { name: end_date,    widget: string, label: End Date (e.g. Present) }
                  - { name: description, widget: text,   label: Description, required: false }
                  - name: logo
                    widget: image
                    label: Institution Logo
                    required: false
                    media_folder: /public/images/about
                    public_folder: /images/about

          - name: body
            widget: markdown
            label: Professional Summary (prose)

  # ── Experience ─────────────────────────────────────────────────────────────
  - name: experience
    label: Experience Page
    files:
      - name: experience
        label: Experience Page
        file: src/content/experience/experience.md
        fields:
          - name: work_history
            widget: object
            label: Internships & Work History
            fields:
              - { name: heading, widget: string, label: "Section heading" }
              - name: entries
                widget: list
                label: Work Entries
                fields:
                  - { name: role,        widget: string, label: Role / Title }
                  - { name: company,     widget: string, label: Company / Organisation }
                  - { name: location,    widget: string, label: Location, required: false }
                  - { name: start_date,  widget: string, label: Start Date }
                  - { name: end_date,    widget: string, label: End Date }
                  - { name: description, widget: text, label: Short Description, required: false }
                  - name: bullets
                    widget: list
                    label: Bullet Points
                    required: false
                    min: 0
                    max: 6
                    hint: "Add 2–4 bullets. Click + to add, drag to reorder, X to remove."
                    field:
                      label: Bullet
                      name: bullet
                      widget: string
                  - name: logo
                    widget: image
                    label: Company Logo
                    required: false
                    media_folder: /public/images/experience
                    public_folder: /images/experience

          - name: volunteering
            widget: object
            label: Volunteering
            fields:
              - { name: heading, widget: string, label: "Section heading" }
              - name: entries
                widget: list
                label: Volunteering Entries
                fields:
                  - { name: role,         widget: string, label: Role }
                  - { name: organization, widget: string, label: Organisation }
                  - { name: location,     widget: string, label: Location, required: false }
                  - { name: start_date,   widget: string, label: Start Date }
                  - { name: end_date,     widget: string, label: End Date }
                  - { name: description, widget: text, label: Short Description, required: false }
                  - name: bullets
                    widget: list
                    label: Bullet Points
                    required: false
                    min: 0
                    max: 6
                    hint: "Click + to add a bullet, drag to reorder, X to remove."
                    field:
                      label: Bullet
                      name: bullet
                      widget: string
                  - name: logo
                    widget: image
                    label: Organisation Logo
                    required: false
                    media_folder: /public/images/experience
                    public_folder: /images/experience

          - name: cv
            widget: object
            label: Resume / CV
            fields:
              - { name: heading,      widget: string, label: "Section heading" }
              - { name: intro,        widget: text,   label: "Intro text" }
              - { name: button_label, widget: string, label: "Download button label" }
              - name: file
                widget: file
                label: CV PDF
                hint: "Upload your CV PDF. Will be served at the uploaded path."
                media_folder: /public
                public_folder: /
                default: /cv.pdf
